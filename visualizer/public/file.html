<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>File Viewer - Profiler Visualizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen p-6">
  <div class="max-w-5xl mx-auto">
    <a href="/" class="text-sm text-blue-600 hover:underline">&larr; Back to files</a>
    <h1 id="title" class="text-2xl font-semibold my-4">File</h1>

    <div class="mb-4 flex gap-4 items-center">
      <label class="flex items-center gap-2"><input id="onlyProfiled" type="checkbox" class="form-checkbox"/> Only profiled lines</label>
      <label class="flex items-center gap-2"><input name="mode" type="radio" value="total" checked/> Color by program total</label>
      <label class="flex items-center gap-2"><input name="mode" type="radio" value="sum"/> Color by sum of profiled times</label>
      <button id="toggleRaw" class="ml-auto px-3 py-1 bg-gray-200 rounded">Toggle raw JSON</button>
    </div>

    <div id="summary" class="bg-white shadow rounded p-4 mb-4"></div>

    <div id="tableContainer" class="bg-white shadow rounded p-4"></div>

    <pre id="raw" class="mt-4 bg-black text-white p-4 rounded overflow-auto" style="display:none; max-height:40vh"></pre>
  </div>

  <script src="/file.js"></script>
</body>
</html>
