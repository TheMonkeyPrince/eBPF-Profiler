<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kernel Profiling Heatmap</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <div id="topBar">
        <div id="topBarTitle">Kernel Source Heatmap</div>
        <div class="controls">
          <label for="argFilter">Arg:</label>
          <select id="argFilter"></select>
          <label for="scaleModeSelect">Scale:</label>
          <select id="scaleModeSelect">
            <option value="profiled">profiled</option>
            <option value="absolute">absolute</option>
          </select>
          <button id="prevProfiledBtn" type="button">Prev</button>
          <button id="nextProfiledBtn" type="button">Next</button>
          <span id="profileNavStatus">0 / 0</span>
          <label class="theme-toggle" for="themeToggle">
            <input id="themeToggle" type="checkbox" />
            <span>Light</span>
          </label>
          <button id="toggleMetaBtn" type="button">Info</button>
          <button id="toggleDetailsBtn" type="button">Details</button>
          <label for="reportSelect">Report:</label>
          <select id="reportSelect"></select>
          <button id="reloadButton" type="button">Reload</button>
        </div>
      </div>
      <div id="meta"></div>
      <div id="hoverDetailsWrap">
        <button id="copyDetailsBtn" type="button">Copy details</button>
        <div id="hoverDetails">Hover a line to see detailed profiling data.</div>
      </div>
    </header>
    <main>
      <aside>
        <h2>Explorer</h2>
        <div id="tree"></div>
        <div id="profiledPanel">
          <div id="profiledPanelHeader">
            <span>Profiled boxes</span>
            <div id="profiledPanelControls">
              <select id="profiledViewSelect" title="How profiled ranges are shown in the panel">
                <option value="list">View: list</option>
                <option value="tree">View: tree</option>
              </select>
              <select id="profiledSortSelect">
                <option value="line">Sort: start line</option>
                <option value="time">Sort: total time</option>
                <option value="calls">Sort: calls (desc)</option>
              </select>
            </div>
          </div>
          <div id="profiledList"></div>
        </div>
      </aside>
      <section>
        <div id="fileTitle">Select a file</div>
        <div id="legend">
          <span>Cold</span>
          <div class="legend-bar"></div>
          <span>Hot</span>
        </div>
        <div id="codePane">
          <div id="monacoEditor"></div>
        </div>
        <details id="bpfProgramDetails">
          <summary>BPF program (disassembly)</summary>
          <pre id="bpfDisasmPre" class="bpf-disasm"></pre>
        </details>
      </section>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
    <script src="/bpf_disasm.js"></script>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
